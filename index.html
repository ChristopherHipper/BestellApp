<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" type="image/x-icon" href="./assets/icon/besteck.png" />
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./style.css">

    <script src="./scripts/dishes.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</head>
<body>
    <header>
        <div class="header_content max_width">
            <div class="logo_content">
                <h1>Beste</h1>
                <img src="./assets/icon/besteck.png" alt="">
                <h1>App</h1>
            </div>
            <img src="./assets/icon/" alt="Burger">
        </div>
    </header>


    <main>
        <div class="main_content">
            <div class="main_img"></div>
            <div class="day_food">
                <h2>Spicy Spring Rolls</h2>
                <a class="rating" href="">Bewertung (4,2 von 5 Sternen)</a>
            </div>
            <div class="navbar">
                <img src="./assets/img/pfeil.png" alt="">
                <h3>Haupgerichte</h3>
                <h3>Salate</h3>
                <h3>Getränke</h3>
            </div>
            <div>
                <img class="food_img" src="./assets/img/hauptgang.jpg" alt="">
                <h3 class="dish_header">Haupgerichte</h3>
            </div>

            <div id="main_dish_content" class="dish_content">
                <div class="dish_infos">
                    <h3>Main_Dish_Name</h3>
                    <span>description</span>
                    <p>price</p>
                </div>
                <button>+</button>
            </div>

            <div>
                <img class="food_img" src="./assets/img/salad.jpg" alt="">
                <h3 class="dish_header">Salate</h3>
            </div>

            <div id="sala_dish_content" class="dish_content">
                <div class="dish_infos">
                    <h3>salad_Dish_Name</h3>
                    <span>description</span>
                    <p>price</p>
                </div>
                <button>+</button>
            </div>

            <div>
                <img class="food_img" src="./assets/img/drinks.jpg" alt="">
                <h3 class="dish_header">Getränke</h3>
            </div>

            <div id="drinks_dish_content" class="dish_content">
                <div class="dish_infos">
                    <h3>salad_Dish_Name</h3>
                    <span>description</span>
                    <p>price</p>
                </div>
                <button>+</button>
            </div>

        </div>
        <div>
            <h2>Warenkorb</h2>
            <div class="seperator"></div>
        </div>
    </main>







    <footer>
        <div class="footer_content max_width">
            <a class="impressum_link" href="./impressum.html">Impressum</a>
        </div>
    </footer>
    
</body>
</html>
